<!-- Prevent FOUC: hide until all stylesheets (including versioned re-fetch) are applied -->
<style>html{visibility:hidden}</style>
<noscript><style>html{visibility:visible}</style></noscript>
<script>document.addEventListener('DOMContentLoaded',function(){document.documentElement.style.visibility='visible';})</script>
<link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/favicon-32.png?v=4' | relative_url }}">
<link rel="icon" type="image/png" sizes="64x64" href="{{ '/assets/images/favicon-64.png?v=4' | relative_url }}">
<link rel="icon" type="image/png" sizes="128x128" href="{{ '/assets/images/favicon.png?v=4' | relative_url }}">
<script>
  (function() {
    var version = "{{ site.time | date: '%s' }}";
    var stylesheet = document.querySelector('link[href*="/assets/css/main.css"]');

    if (!stylesheet) return;

    try {
      var url = new URL(stylesheet.getAttribute('href'), window.location.origin);
      if (url.searchParams.get('v') === version) return;
      url.searchParams.set('v', version);
      stylesheet.href = url.pathname + url.search + url.hash;
    } catch (error) {
      console.warn('Unable to version main.css.', error);
    }
  })();
</script>
