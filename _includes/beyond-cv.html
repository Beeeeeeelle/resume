<style>
/* ── Beyond the CV strip ── */
.bcv {
  margin: 2.5rem 0 1rem;
}
.bcv__heading {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #bbb;
  margin: 0 0 14px;
}
.bcv__wrap {
  overflow: hidden;
  width: 100%;
  border-radius: 12px;
}
.bcv__track {
  display: flex;
  gap: 10px;
  width: max-content;
  animation: bcv-scroll 50s linear infinite;
}
.bcv__track:hover {
  animation-play-state: paused;
}
@keyframes bcv-scroll {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.bcv__item {
  flex-shrink: 0;
  width: 200px;
  height: 170px;
  border-radius: 10px;
  overflow: hidden;
  margin: 0;
  position: relative;
  cursor: default;
}
.bcv__item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  border-radius: 10px;
  transition: transform 0.35s ease;
}
.bcv__item:hover img {
  transform: scale(1.05);
}
.bcv__cap {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 22px 10px 8px;
  background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
  color: #fff;
  font-size: 11.5px;
  font-weight: 500;
  border-radius: 0 0 10px 10px;
  opacity: 0;
  transition: opacity 0.25s ease;
  pointer-events: none;
}
.bcv__item:hover .bcv__cap {
  opacity: 1;
}
</style>
