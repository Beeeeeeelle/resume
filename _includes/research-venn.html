<script>
(function () {
  var tip = document.getElementById('rv-tooltip');
  var wrap = document.querySelector('.rv-wrapper');
  if (!tip || !wrap) return;
  document.querySelectorAll('.paper-tag').forEach(function (el) {
    el.addEventListener('mouseenter', function () {
      var t = el.getAttribute('data-title');
      var v = el.getAttribute('data-venue');
      if (!t) return;
      tip.innerHTML = '<strong>' + t + '</strong><br><span style="color:#888;font-size:11.5px">' + v + '</span>';
      tip.style.display = 'block';
    });
    el.addEventListener('mousemove', function (e) {
      var r = wrap.getBoundingClientRect();
      var x = e.clientX - r.left + 14;
      var y = e.clientY - r.top + 14;
      if (x + 315 > r.width) x = e.clientX - r.left - 322;
      if (y + 90 > r.height) y = e.clientY - r.top - 98;
      tip.style.left = x + 'px';
      tip.style.top = y + 'px';
    });
    el.addEventListener('mouseleave', function () {
      tip.style.display = 'none';
    });
  });
}());
</script>
