/*
  Blob scaling is handled by writing SVG transform attributes directly.
  This keeps the soft overlapping blend effect intact during hover.
*/

.zone-rq {
  opacity: 0;
  transition: opacity 0.28s ease 0.06s;
  pointer-events: none;
}

.rv-label { transition: opacity 0.28s ease; }

[data-hover="b"] .rv-label:not(.rv-label-b),
[data-hover="c"] .rv-label:not(.rv-label-c),
[data-hover="d"] .rv-label:not(.rv-label-d) { opacity: 0.3; }

.paper-tag {
  cursor: pointer;
  transform-box: fill-box;
  transform-origin: center;
  transition: transform 0.22s ease, filter 0.22s ease;
}
.tag-bg {
  fill: rgba(255,255,255,0.82);
  stroke: rgba(180,180,180,0.4);
  stroke-width: 0.8;
}
.tag-text {
  font-family: system-ui,-apple-system,'Segoe UI',sans-serif;
  font-size: 12px;
  font-weight: 600;
  fill: #333;
}

.tag-a .tag-bg { fill: rgba(123,156,200,0.15); stroke: rgba(123,156,200,0.55); }
.tag-a .tag-text { fill: #2c4a6e; }
.tag-a:hover .tag-bg { fill: rgba(123,156,200,0.3); }

.tag-b .tag-bg { fill: rgba(200,134,142,0.14); stroke: rgba(200,134,142,0.55); }

.tag-c .tag-text { fill: #2a5a3a; }

.tag-d .tag-bg { fill: rgba(209,167,96,0.15); stroke: rgba(192,145,63,0.52); }
.tag-d .tag-text { fill: #76511a; }
.tag-d:hover .tag-bg { fill: rgba(209,167,96,0.3); }

[data-hover="a"] .tag-a,
[data-hover="b"] .tag-b,
[data-hover="c"] .tag-c,
[data-hover="d"] .tag-d {
  transform: translateY(-3px) scale(1.04);
  filter: drop-shadow(0 3px 8px rgba(0,0,0,0.13));
}

.rv-tooltip {
  position: absolute;
  background: #fff;
  border: 1px solid #e2e2e2;
  border-radius: 8px;
  padding: 10px 14px;
  max-width: 300px;
  font-size: 13px;
  line-height: 1.55;
  pointer-events: none;
  display: none;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  z-index: 20;
}

.rv-core-chip {
  fill: rgba(255,255,255,0.78);
  stroke: rgba(176,146,97,0.34);
  stroke-width: 0.8;
}

.rv-core-chip-text {

}

<script>
(function () {
  var svg = document.getElementById('rv-svg');
  var tip = document.getElementById('rv-tooltip');
  var wrap = document.querySelector('.rv-wrapper');
  if (!svg) return;

  var BLOBS = {
    a: { g: svg.querySelector('.blob-a'), cx: 248, cy: 228 },
    b: { g: svg.querySelector('.blob-b'), cx: 642, cy: 228 },
    c: { g: svg.querySelector('.blob-c'), cx: 252, cy: 437 },
    d: { g: svg.querySelector('.blob-d'), cx: 646, cy: 437 }
  };
  var scales = { a: 1.0, b: 1.0, c: 1.0, d: 1.0 };
  var rafs = {};

  function easeOutBack(t) {
    var c1 = 1.5;
    var c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  }

  function easeInOutQuad(t) {
    return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
  }

  function applyScale(zone) {
    var blob = BLOBS[zone];
    if (!blob || !blob.g) return;
    var s = scales[zone];
    blob.g.setAttribute(
      'transform',
      'translate(' + blob.cx + ',' + blob.cy + ')' +
      ' scale(' + s.toFixed(5) + ')' +
      ' translate(' + (-blob.cx) + ',' + (-blob.cy) + ')'
    );
  }

  function animateTo(zone, target) {
    if (rafs[zone]) cancelAnimationFrame(rafs[zone]);
    var start = scales[zone];
    var t0 = performance.now();
    var duration = target > 1 ? 480 : 320;
    var ease = target > 1 ? easeOutBack : easeInOutQuad;

    function step(now) {
      var t = Math.min((now - t0) / duration, 1);
      scales[zone] = start + (target - start) * ease(t);
      applyScale(zone);
      if (t < 1) rafs[zone] = requestAnimationFrame(step);
    }

    rafs[zone] = requestAnimationFrame(step);
  }

  svg.querySelectorAll('.rv-hit').forEach(function (el) {
    el.addEventListener('mouseenter', function () {
      var zone = el.getAttribute('data-zone');
      svg.setAttribute('data-hover', zone);
      animateTo(zone, 1.06);
    });
    el.addEventListener('mouseleave', function () {
      var zone = el.getAttribute('data-zone');
      svg.removeAttribute('data-hover');
      animateTo(zone, 1.0);
    });
  });

  if (!tip || !wrap) return;
  svg.querySelectorAll('.paper-tag').forEach(function (el) {
    el.addEventListener('mouseenter', function () {
      var title = el.getAttribute('data-title');
      var venue = el.getAttribute('data-venue');
      if (!title) return;
      tip.innerHTML = '<strong>' + title + '</strong>' +
        '<br><span style="color:#888;font-size:11.5px">' + venue + '</span>';
      tip.style.display = 'block';
    });
    el.addEventListener('mousemove', function (e) {
      var rect = wrap.getBoundingClientRect();
      var x = e.clientX - rect.left + 14;
      var y = e.clientY - rect.top + 14;
      if (x + 315 > rect.width) x = e.clientX - rect.left - 322;
      if (y + 90 > rect.height) y = e.clientY - rect.top - 98;
      tip.style.left = x + 'px';
      tip.style.top = y + 'px';
    });
    el.addEventListener('mouseleave', function () {
      tip.style.display = 'none';
    });
  });
}());
</script>
