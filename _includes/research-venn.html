<style>
.rv-section { margin: 40px 0 0; }
.rv-wrapper { position: relative; width: 100%; max-width: 920px; margin: 0 auto; }
.rv-svg { width: 100%; height: auto; display: block; }

/*
  Blob scaling is handled by writing SVG transform attributes directly.
  This keeps the soft overlapping blend effect intact during hover.
*/

.zone-rq {
  opacity: 0;
  transition: opacity 0.28s ease 0.06s;
  pointer-events: none;
}
[data-hover="a"] .zone-rq-a { opacity: 1; }
[data-hover="b"] .zone-rq-b { opacity: 1; }
[data-hover="c"] .zone-rq-c { opacity: 1; }
[data-hover="d"] .zone-rq-d { opacity: 1; }

.rv-label { transition: opacity 0.28s ease; }
[data-hover="a"] .rv-label:not(.rv-label-a),
[data-hover="b"] .rv-label:not(.rv-label-b),
[data-hover="c"] .rv-label:not(.rv-label-c),
[data-hover="d"] .rv-label:not(.rv-label-d) { opacity: 0.3; }

.rv-core-chip {
  fill: rgba(255,255,255,0.78);
  stroke: rgba(176,146,97,0.34);
  stroke-width: 0.8;
}
.rv-core-chip-text {
  font-family: system-ui,-apple-system,'Segoe UI',sans-serif;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.03em;
  fill: #8b6b33;
}

/* ── Connector flow ── */
.rv-connector {
  stroke-dasharray: 5 10;
  stroke-linecap: round;
  transition: stroke-opacity 0.28s ease, stroke-width 0.28s ease;
}
.rv-connector-a { stroke: #7b9cc8; stroke-opacity: 0.22; stroke-width: 2; }
.rv-connector-b { stroke: #c8868e; stroke-opacity: 0.22; stroke-width: 2; }
.rv-connector-c { stroke: #82b896; stroke-opacity: 0.24; stroke-width: 2; }
.rv-connector-d { stroke: #d1a760; stroke-opacity: 0.26; stroke-width: 2; }
@media (prefers-reduced-motion: no-preference) {
  .rv-connector-a { animation: rv-flow 2.2s linear infinite; }
  .rv-connector-b { animation: rv-flow 2.2s linear infinite 0.55s; }
  .rv-connector-c { animation: rv-flow 2.2s linear infinite 1.1s; }
  .rv-connector-d { animation: rv-flow 2.2s linear infinite 1.65s; }
}
@keyframes rv-flow {
  from { stroke-dashoffset: 15; }
  to   { stroke-dashoffset: 0; }
}
[data-hover] .rv-connector                { stroke-opacity: 0.08; stroke-width: 1.5; }
[data-hover="a"] .rv-connector-a          { stroke-opacity: 0.65; stroke-width: 3; }
[data-hover="b"] .rv-connector-b          { stroke-opacity: 0.65; stroke-width: 3; }
[data-hover="c"] .rv-connector-c          { stroke-opacity: 0.65; stroke-width: 3; }
[data-hover="d"] .rv-connector-d          { stroke-opacity: 0.65; stroke-width: 3; }

/* ── Color shimmer ── */
@media (prefers-reduced-motion: no-preference) {
  .blob-a path { animation: rv-shimmer 9s ease-in-out infinite; }
  .blob-b path { animation: rv-shimmer 9s ease-in-out infinite 2.25s; }
  .blob-c path { animation: rv-shimmer 9s ease-in-out infinite 4.5s; }
  .blob-d path { animation: rv-shimmer 9s ease-in-out infinite 6.75s; }
}
@keyframes rv-shimmer {
  0%, 100% { fill-opacity: 1; }
  50%       { fill-opacity: 0.68; }
}

/* ── Publication dots ── */
.vb-dot {
  transform-box: fill-box;
  transform-origin: center;
  transition: opacity 0.3s ease, transform 0.28s cubic-bezier(0.34,1.56,0.64,1), filter 0.2s ease;
  /* White halo so dots stay visible against blended overlap backgrounds */
  filter: drop-shadow(0 0 3px rgba(255,255,255,0.92)) drop-shadow(0 0 1px rgba(255,255,255,0.7));
}

/* Zone colors */
.vb-dot-a  { fill: #7b9cc8; stroke: #7b9cc8; }
.vb-dot-b  { fill: #c8868e; stroke: #c8868e; }
.vb-dot-c  { fill: #82b896; stroke: #82b896; }
.vb-dot-d  { fill: #d1a760; stroke: #d1a760; }
.vb-dot-ab { fill: #a491ab; stroke: #a491ab; }
.vb-dot-ac { fill: #7cb0b0; stroke: #7cb0b0; }
.vb-dot-bd { fill: #cc9777; stroke: #cc9777; }
.vb-dot-cd { fill: #a9bb78; stroke: #a9bb78; }

/* Status variants */
.vb-dot[data-status="published"],
.vb-dot[data-status="accepted"] { fill-opacity: 0.88; stroke-width: 0; }
.vb-dot[data-status="in-press"] { fill-opacity: 0.65; stroke-width: 0; }
.vb-dot[data-status="review"],
.vb-dot[data-status="revision"] { fill-opacity: 0.22; stroke-opacity: 0.9; stroke-width: 1.8; }
.vb-dot[data-status="progress"] { fill-opacity: 0.15; stroke-opacity: 0.85; stroke-width: 1.8; stroke-dasharray: 3 3; }

/* Blob-hover states */
.vb-dot-dim    { opacity: 0.12 !important; animation: none !important; }
.vb-dot-focus  { filter: drop-shadow(0 0 3px rgba(255,255,255,0.92)) brightness(1.35) drop-shadow(0 2px 6px rgba(0,0,0,0.28)); transform: scale(1.22); }

@keyframes vb-pulse {
  0%, 100% { transform: scale(1); }
  50%       { transform: scale(1.2); }
}
@media (prefers-reduced-motion: no-preference) {
  .vb-dot-active { animation: vb-pulse 1.4s ease-in-out infinite; }
}


/* ── Popover ── */
#vb-popover {
  position: fixed;
  background: #fff;
  border: 1px solid #e0e0e0;
  border-radius: 10px;
  padding: 12px 15px;
  max-width: 288px;
  min-width: 196px;
  font-size: 13px;
  line-height: 1.5;
  pointer-events: auto;
  display: none;
  box-shadow: 0 6px 24px rgba(0,0,0,0.11);
  z-index: 999;
  font-family: system-ui,-apple-system,'Segoe UI',sans-serif;
}
.vb-pop-title  { font-weight: 700; font-size: 12.5px; color: #1a1a1a; line-height: 1.4; margin-bottom: 3px; }
.vb-pop-venue  { font-style: italic; color: #777; font-size: 11.5px; }
.vb-pop-meta   { margin-top: 7px; display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
.vb-pop-badge  { font-size: 10.5px; font-weight: 600; padding: 2px 8px; border-radius: 10px; }
.vb-pop-year        { background: #f0f0f0; color: #555; }
.vb-pop-s-published { background: #e8f5e9; color: #2e7d32; }
.vb-pop-s-accepted  { background: #e3f2fd; color: #1565c0; }
.vb-pop-s-in-press  { background: #e0f7fa; color: #006064; }
.vb-pop-s-review    { background: #fff3e0; color: #e65100; }
.vb-pop-s-revision  { background: #fce4ec; color: #b71c1c; }
.vb-pop-s-progress  { background: #f3e5f5; color: #6a1b9a; }
.vb-pop-link { display: inline-block; margin-top: 7px; font-size: 11.5px; color: #5a7fc0; font-weight: 600; text-decoration: none; }
.vb-pop-link:hover { text-decoration: underline; }
</style>

<div id="vb-popover" role="tooltip" aria-live="polite"></div>

<script>
(function () {
  var svg  = document.getElementById('rv-svg');
  var pop  = document.getElementById('vb-popover');
  if (!svg) return;

  /* ── Paper metadata ── */
  var PAPERS = {
    a1:  { title: 'Development and Validation of the PA-SDA Scale', venue: 'System', year: '2025', status: 'published', href: 'https://doi.org/10.1016/j.system.2025.103793' },
    a2:  { title: 'Reconceptualizing Self-Directed Learning in the Era of Generative AI', venue: 'IEEE Transactions on Learning Technologies', year: '2024', status: 'published', href: 'https://doi.org/10.1109/TLT.2024.3386098' },
    a3:  { title: 'Collaborative Problem Solving with Generative AI', venue: 'Computers & Education: AI', year: '2025', status: 'published', href: 'https://doi.org/10.1016/j.caeai.2025.100393' },
    a4:  { title: 'SDL with GenAI: Insights from YouTube Creators', venue: 'TechTrends', year: '2024', status: 'published', href: 'https://doi.org/10.1007/s11528-024-00960-3' },
    a5:  { title: 'Multilingual ChatGPT Applications in Language Learning', venue: 'IJCALLT', year: '2023', status: 'published', href: 'https://doi.org/10.4018/IJCALLT.326135' },
    a6:  { title: 'Dynamic Learner State Modeling via MCP', venue: 'Education Sciences', year: '2025', status: 'published', href: 'https://doi.org/10.3390/educsci15081004' },
    b1:  { title: 'What Makes Student–AI Collaborative Writing Authentic? A Q-Methodology Study', venue: 'British Journal of Educational Technology', year: '', status: 'review', href: null },
    b2:  { title: 'Design Precedents to Design Innovation: An AI Writing Assessment System', venue: 'Journal of Computing in Higher Education', year: '', status: 'progress', href: null },
    b3:  { title: 'Infusing Authenticity into Service-Learning in the Age of AI', venue: 'Education + Training', year: '', status: 'revision', href: null },
    b4:  { title: 'Coding Their Choices: A Discrete Choice Experiment on AI Writing', venue: 'Journal of Educational Computing Research', year: '', status: 'review', href: null },
    c1:  { title: "Analysing Nontraditional Students' ChatGPT Interaction, Engagement, Self-Efficacy and Performance", venue: 'British Journal of Educational Technology', year: '2025', status: 'published', href: 'https://doi.org/10.1111/bjet.13588' },
    c2:  { title: "Nontraditional Learners' Ownership and Agency with AI Writing Tools", venue: 'Journal of Computing in Higher Education', year: '2025', status: 'published', href: 'https://doi.org/10.1007/s12528-025-09476-y' },
    c3:  { title: 'Empowering Students from Low-Income Families to Improve Writing with ChatGPT', venue: 'Languages', year: '2023', status: 'published', href: 'https://doi.org/10.3390/languages8040238' },
    c4:  { title: 'Culturally and Linguistically Responsive Professional Development for AI Integration', venue: 'Online Learning', year: '2023', status: 'published', href: 'https://doi.org/10.24059/olj.v27i4.4003' },
    c5:  { title: 'The Emotional Equation: Affective Dimensions of AI-Assisted Writing', venue: 'Education and Information Technologies', year: '', status: 'review', href: null },
    d1:  { title: 'AI-Generation Literacy', venue: 'Palgrave Encyclopedia of CALL', year: '2026', status: 'published', href: 'https://doi.org/10.1007/978-3-031-51447-0_260-1' },
    d2:  { title: 'Two Years of Innovation: Systematic Review of GenAI in Language Learning', venue: 'Computers and Education: AI', year: '2025', status: 'published', href: 'https://doi.org/10.1016/j.caeai.2025.100445' },
    d3:  { title: 'Language Educators × Generative AI: A Systematic Review', venue: 'International Journal of AI in Education', year: '', status: 'accepted', href: null },
    d4:  { title: 'The First Year of ChatGPT in Education: A Comprehensive Review', venue: 'Computers and Education: AI', year: '2024', status: 'published', href: 'https://doi.org/10.1016/j.caeai.2024.100266' },
    d5:  { title: 'TicApp: A Language Learning Design Case', venue: 'Springer', year: '2024', status: 'published', href: 'https://doi.org/10.1007/978-3-031-76293-2_12' },
    d6:  { title: 'PeteChat: A Guardrailed AI Tutoring Assistant', venue: 'Innovation Hub', year: '', status: 'progress', href: '/projects/petechat/' },
    d7:  { title: 'AI and Extended Reality in Language Education', venue: 'Education Sciences', year: '2025', status: 'published', href: 'https://doi.org/10.3390/educsci15081066' },
    d8:  { title: 'Generating Learner Personas via Large Language Models', venue: 'Journal of AI in Education', year: '2025', status: 'published', href: 'https://jaid.edtechbooks.org/jaid_14_3/fkuqikevdr' },
    ab1: { title: 'Learning in the Loop: Moments, Mindsets, and Meaning with Generative AI', venue: 'Under review', year: '', status: 'review', href: null },
    ab2: { title: 'Choosing the Future of Learning: A Discrete Choice Experiment', venue: 'Under review', year: '', status: 'review', href: null },
    ac1: { title: 'Pathways to Proficiency: Global Validation of the PA-SDA Scale', venue: 'Under review', year: '', status: 'review', href: null },
    bd1: { title: 'Design Precedents Informing an AI Monitoring System for Writing Assessment', venue: 'In progress', year: '', status: 'progress', href: null },
    cd1: { title: 'AI-Assisted Learning Satisfaction and Acceptance Across Learner Groups', venue: 'In press', year: '', status: 'in-press', href: null }
  };

  var STATUS_LABELS = {
    'published': 'Published', 'accepted': 'Accepted', 'in-press': 'In Press',
    'review': 'Under Review', 'revision': 'Major Revision', 'progress': 'In Progress'
  };

  /* ── Blob animation ── */
  var BLOBS = {
    a: { g: svg.querySelector('.blob-a'), cx: 248, cy: 228 },
    b: { g: svg.querySelector('.blob-b'), cx: 642, cy: 228 },
    c: { g: svg.querySelector('.blob-c'), cx: 252, cy: 437 },
    d: { g: svg.querySelector('.blob-d'), cx: 646, cy: 437 }
  };
  var scales = { a: 1.0, b: 1.0, c: 1.0, d: 1.0 };
  var rafs = {};
  var hoverZone = null;
  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function easeOutBack(t) {
    var c1 = 1.5, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  }
  function easeInOutQuad(t) {
    return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
  }
  function applyScale(zone) {
    var blob = BLOBS[zone];
    if (!blob || !blob.g) return;
    var s = scales[zone];
    blob.g.setAttribute('transform',
      'translate(' + blob.cx + ',' + blob.cy + ')' +
      ' scale(' + s.toFixed(5) + ')' +
      ' translate(' + (-blob.cx) + ',' + (-blob.cy) + ')'
    );
  }
  function animateTo(zone, target) {
    if (rafs[zone]) cancelAnimationFrame(rafs[zone]);
    var start = scales[zone], t0 = performance.now();
    var duration = target > 1 ? 480 : 320;
    var ease = target > 1 ? easeOutBack : easeInOutQuad;
    function step(now) {
      var t = Math.min((now - t0) / duration, 1);
      scales[zone] = start + (target - start) * ease(t);
      applyScale(zone);
      if (t < 1) rafs[zone] = requestAnimationFrame(step);
      else delete rafs[zone];
    }
    rafs[zone] = requestAnimationFrame(step);
  }

  /* ── Breathing ── */
  if (!reduceMotion) {
    var ZONES = ['a', 'b', 'c', 'd'];
    var PHASES = [0, Math.PI * 0.5, Math.PI, Math.PI * 1.5];
    requestAnimationFrame(function breathe(ts) {
      for (var i = 0; i < ZONES.length; i++) {
        var z = ZONES[i];
        if (z === hoverZone || rafs[z]) continue;
        scales[z] = 1 + 0.014 * Math.sin(ts / 827 + PHASES[i]);
        applyScale(z);
      }
      requestAnimationFrame(breathe);
    });
  }

  /* ── Dot state on zone hover ── */
  function highlightDotsForZone(zone) {
    svg.querySelectorAll('.vb-dot').forEach(function (dot) {
      var dz = dot.getAttribute('data-zone');
      dot.classList.remove('vb-dot-active', 'vb-dot-dim');
      if (dz.indexOf(zone) !== -1) {
        dot.classList.add('vb-dot-active');
      } else {
        dot.classList.add('vb-dot-dim');
      }
    });
  }
  function resetDots() {
    svg.querySelectorAll('.vb-dot').forEach(function (dot) {
      dot.classList.remove('vb-dot-active', 'vb-dot-dim');
    });
  }

  /* ── Hit zone events ── */
  svg.querySelectorAll('.rv-hit').forEach(function (el) {
    el.addEventListener('mouseenter', function () {
      var zone = el.getAttribute('data-zone');
      hoverZone = zone;
      svg.setAttribute('data-hover', zone);
      animateTo(zone, 1.06);
      highlightDotsForZone(zone);
    });
    el.addEventListener('mouseleave', function () {
      var zone = el.getAttribute('data-zone');
      hoverZone = null;
      svg.removeAttribute('data-hover');
      animateTo(zone, 1.0);
      resetDots();
    });
    el.addEventListener('click', function () {
      var target = el.getAttribute('data-target');
      if (target) window.location.href = target;
    });
    el.addEventListener('keydown', function (evt) {
      if (evt.key !== 'Enter' && evt.key !== ' ') return;
      evt.preventDefault();
      var target = el.getAttribute('data-target');
      if (target) window.location.href = target;
    });
  });

  /* ── Dot proximity hover via SVG mousemove ── */
  var dotData = [];
  svg.querySelectorAll('.vb-dot').forEach(function (dot) {
    dotData.push({
      el: dot,
      cx: parseFloat(dot.getAttribute('cx')),
      cy: parseFloat(dot.getAttribute('cy')),
      r:  parseFloat(dot.getAttribute('r'))
    });
  });

  var currentFocusDot = null;
  var popDot = null;      // dot whose popover is currently shown
  var popTimer = null;    // hide-delay timer

  function svgPoint(e) {
    var pt = svg.createSVGPoint();
    pt.x = e.clientX; pt.y = e.clientY;
    return pt.matrixTransform(svg.getScreenCTM().inverse());
  }

  function buildPopover(paper) {
    var statusCls = 'vb-pop-s-' + paper.status;
    var statusLabel = STATUS_LABELS[paper.status] || paper.status;
    var html = '<div class="vb-pop-title">' + paper.title + '</div>';
    if (paper.venue) html += '<div class="vb-pop-venue">' + paper.venue + '</div>';
    html += '<div class="vb-pop-meta">';
    if (paper.year) html += '<span class="vb-pop-badge vb-pop-year">' + paper.year + '</span>';
    html += '<span class="vb-pop-badge ' + statusCls + '">' + statusLabel + '</span>';
    html += '</div>';
    if (paper.href) {
      var isExternal = paper.href.indexOf('http') === 0;
      var isPublished = paper.status === 'published' || paper.status === 'accepted' || paper.status === 'in-press';
      var label = isPublished ? '→ Read paper' : '→ Learn more';
      var tgt = isExternal ? ' target="_blank" rel="noopener"' : '';
      html += '<a class="vb-pop-link" href="' + paper.href + '"' + tgt + '>' + label + '</a>';
    }
    return html;
  }

  function showPopoverForDot(dot, e) {
    clearTimeout(popTimer);
    var paper = PAPERS[dot.getAttribute('data-paper-id')];
    if (!paper) return;
    pop.innerHTML = buildPopover(paper);
    pop.style.display = 'block';
    // Position once per dot — stays fixed so user can click the link
    var w = 272, h = 130;
    var x = e.clientX + 18, y = e.clientY - 10;
    if (x + w > window.innerWidth  - 10) x = e.clientX - w - 14;
    if (y + h > window.innerHeight - 10) y = e.clientY - h - 14;
    pop.style.left = x + 'px';
    pop.style.top  = y + 'px';
  }

  function scheduleHide() {
    clearTimeout(popTimer);
    popTimer = setTimeout(function () {
      pop.style.display = 'none';
      if (currentFocusDot) { currentFocusDot.classList.remove('vb-dot-focus'); currentFocusDot = null; }
      popDot = null;
    }, 200);
  }

  svg.addEventListener('mousemove', function (e) {
    var pt = svgPoint(e);
    var closestDot = null, closestDist = Infinity;
    for (var i = 0; i < dotData.length; i++) {
      var d = dotData[i];
      var dx = pt.x - d.cx, dy = pt.y - d.cy;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (dist <= d.r + 5 && dist < closestDist) {
        closestDist = dist;
        closestDot = d.el;
      }
    }

    // Update focus highlight
    if (closestDot !== currentFocusDot) {
      if (currentFocusDot) currentFocusDot.classList.remove('vb-dot-focus');
      currentFocusDot = closestDot;
      if (currentFocusDot) currentFocusDot.classList.add('vb-dot-focus');
    }

    // Show/update popover only when the active dot changes
    if (closestDot !== popDot) {
      popDot = closestDot;
      if (closestDot) {
        showPopoverForDot(closestDot, e);
      } else {
        scheduleHide();
      }
    }
  });

  svg.addEventListener('mouseleave', function () {
    if (currentFocusDot) { currentFocusDot.classList.remove('vb-dot-focus'); currentFocusDot = null; }
    scheduleHide();
  });

  // Keep popover alive when mouse moves onto it (to click the link)
  if (pop) {
    pop.addEventListener('mouseenter', function () { clearTimeout(popTimer); });
    pop.addEventListener('mouseleave', function () { popDot = null; scheduleHide(); });
  }

  /* ── Dots visible immediately ── */
  svg.querySelectorAll('.vb-dot').forEach(function (dot) {
    dot.classList.remove('vb-dot-enter');
  });

  /* ── bfcache cleanup: restore clean state on browser back/forward ── */
  window.addEventListener('pageshow', function (e) {
    if (!e.persisted) return;
    clearTimeout(popTimer);
    if (pop) pop.style.display = 'none';
    popDot = null;
    if (currentFocusDot) { currentFocusDot.classList.remove('vb-dot-focus'); currentFocusDot = null; }
    svg.removeAttribute('data-hover');
    resetDots();
    hoverZone = null;
    ['a', 'b', 'c', 'd'].forEach(function (z) { scales[z] = 1.0; applyScale(z); });
  });

  window.addEventListener('pagehide', function () {
    clearTimeout(popTimer);
    if (pop) pop.style.display = 'none';
    // Don't touch SVG state here — CSS transitions would fire during navigation (causing the flash).
    // bfcache restore is handled by pageshow above.
  });

}());
</script>
