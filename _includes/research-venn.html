<style>
.rv-section { margin: 40px 0 0; }
.rv-wrapper { position: relative; width: 100%; max-width: 900px; margin: 0 auto; }
.rv-svg { width: 100%; height: auto; display: block; }

/* ── Blob scale on zone hover ── */
.blob-g {
  transform-box: fill-box;
  transform-origin: center;
  transition: transform 0.45s cubic-bezier(0.34,1.40,0.64,1);
}
[data-hover="a"] .blob-g.blob-a { transform: scale(1.08); }
[data-hover="b"] .blob-g.blob-b { transform: scale(1.08); }
[data-hover="c"] .blob-g.blob-c { transform: scale(1.08); }

/* ── Research questions (hidden → visible on hover) ── */
.zone-rq {
  opacity: 0;
  transition: opacity 0.3s ease 0.05s;
  pointer-events: none;
}
[data-hover="a"] .zone-rq-a { opacity: 1; }
[data-hover="b"] .zone-rq-b { opacity: 1; }
[data-hover="c"] .zone-rq-c { opacity: 1; }

/* ── Zone label dimming (non-hovered zones) ── */
.rv-label {
  transition: opacity 0.3s ease;
}
[data-hover="a"] .rv-label:not(.rv-label-a),
[data-hover="b"] .rv-label:not(.rv-label-b),
[data-hover="c"] .rv-label:not(.rv-label-c) {
  opacity: 0.35;
}

/* ── Base tag style ── */
.paper-tag {
  cursor: pointer;
  transition: transform 0.25s ease, filter 0.25s ease;
}
.tag-bg {
  fill: rgba(255,255,255,0.82);
  stroke: rgba(180,180,180,0.40);
  stroke-width: 0.8;
}
.tag-text {
  font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
  font-size: 12px;
  font-weight: 600;
  fill: #333;
}

/* ── Zone-tinted tags (muted palette) ── */
.tag-a  .tag-bg { fill: rgba(123,156,200,0.15); stroke: rgba(123,156,200,0.55); }
.tag-a  .tag-text { fill: #2c4a6e; }
.tag-a:hover .tag-bg { fill: rgba(123,156,200,0.28); }

.tag-b  .tag-bg { fill: rgba(200,134,142,0.14); stroke: rgba(200,134,142,0.55); }
.tag-b  .tag-text { fill: #6e2c38; }
.tag-b:hover .tag-bg { fill: rgba(200,134,142,0.28); }

.tag-c  .tag-bg { fill: rgba(130,184,150,0.14); stroke: rgba(130,184,150,0.55); }
.tag-c  .tag-text { fill: #2a5a3a; }
.tag-c:hover .tag-bg { fill: rgba(130,184,150,0.28); }

.tag-ab .tag-bg { fill: rgba(165,115,180,0.14); stroke: rgba(165,115,180,0.50); }
.tag-ab .tag-text { fill: #522866; }
.tag-ab:hover .tag-bg { fill: rgba(165,115,180,0.28); }

.tag-ac .tag-bg { fill: rgba(105,165,160,0.14); stroke: rgba(105,165,160,0.50); }
.tag-ac .tag-text { fill: #1e5050; }
.tag-ac:hover .tag-bg { fill: rgba(105,165,160,0.28); }

.tag-bc .tag-bg { fill: rgba(185,150,90,0.14); stroke: rgba(185,150,90,0.50); }
.tag-bc .tag-text { fill: #5a3a0a; }
.tag-bc:hover .tag-bg { fill: rgba(185,150,90,0.28); }

/* ── Tags float on zone hover ── */
[data-hover="a"] .tag-a,
[data-hover="a"] .tag-ab,
[data-hover="a"] .tag-ac {
  transform: translateY(-3px);
  filter: drop-shadow(0 4px 10px rgba(0,0,0,0.14));
}
[data-hover="b"] .tag-b,
[data-hover="b"] .tag-ab,
[data-hover="b"] .tag-bc {
  transform: translateY(-3px);
  filter: drop-shadow(0 4px 10px rgba(0,0,0,0.14));
}
[data-hover="c"] .tag-c,
[data-hover="c"] .tag-ac,
[data-hover="c"] .tag-bc {
  transform: translateY(-3px);
  filter: drop-shadow(0 4px 10px rgba(0,0,0,0.14));
}

/* ── Tooltip ── */
.rv-tooltip {
  position: absolute;
  background: #fff;
  border: 1px solid #e2e2e2;
  border-radius: 8px;
  padding: 10px 14px;
  max-width: 300px;
  font-size: 13px;
  line-height: 1.55;
  pointer-events: none;
  display: none;
  box-shadow: 0 4px 20px rgba(0,0,0,0.10);
  z-index: 20;
}
</style>

<script>
(function () {
  var svg  = document.getElementById('rv-svg');
  var tip  = document.getElementById('rv-tooltip');
  var wrap = document.querySelector('.rv-wrapper');
  if (!svg) return;

  /* ── Zone hover ── */
  document.querySelectorAll('.rv-hit').forEach(function (el) {
    el.addEventListener('mouseenter', function () {
      svg.setAttribute('data-hover', el.getAttribute('data-zone'));
    });
    el.addEventListener('mouseleave', function () {
      svg.removeAttribute('data-hover');
    });
  });

  /* ── Paper tag tooltip ── */
  if (!tip || !wrap) return;
  document.querySelectorAll('.paper-tag').forEach(function (el) {
    el.addEventListener('mouseenter', function () {
      var t = el.getAttribute('data-title');
      var v = el.getAttribute('data-venue');
      if (!t) return;
      tip.innerHTML = '<strong>' + t + '</strong><br><span style="color:#888;font-size:11.5px">' + v + '</span>';
      tip.style.display = 'block';
    });
    el.addEventListener('mousemove', function (e) {
      var r = wrap.getBoundingClientRect();
      var x = e.clientX - r.left + 14;
      var y = e.clientY - r.top  + 14;
      if (x + 315 > r.width)  x = e.clientX - r.left - 322;
      if (y + 90  > r.height) y = e.clientY - r.top  - 98;
      tip.style.left = x + 'px';
      tip.style.top  = y + 'px';
    });
    el.addEventListener('mouseleave', function () {
      tip.style.display = 'none';
    });
  });
}());
</script>
