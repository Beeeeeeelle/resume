/*
  BLOB SCALING: intentionally NOT done with CSS transform/transition.
  CSS transforms on SVG <g> elements promote compositor layers and break

[data-hover="b"] .zone-rq-b { opacity: 1; }
[data-hover="c"] .zone-rq-c { opacity: 1; }

/* ── Zone label dimming ── */

[data-hover="b"] .rv-label:not(.rv-label-b),
[data-hover="c"] .rv-label:not(.rv-label-c) { opacity: 0.30; }

/* ── Tag base ── */
.paper-tag {
  cursor: pointer;
  /* transform-box + transform-origin ensure translateY is relative to
     each tag's own bounding box, not the SVG viewport */
  transform-box: fill-box;
  transform-origin: center;
  transition: transform 0.22s ease, filter 0.22s ease;
}
.tag-bg  { fill: rgba(255,255,255,0.82); stroke: rgba(180,180,180,0.40); stroke-width: 0.8; }
.tag-text { font-family: system-ui,-apple-system,'Segoe UI',sans-serif; font-size: 12px; font-weight: 600; fill: #333; }

/* ── Tags float on zone hover ── */

<script>
(function () {
  var svg  = document.getElementById('rv-svg');
  var tip  = document.getElementById('rv-tooltip');
  var wrap = document.querySelector('.rv-wrapper');
  if (!svg) return;

  /* ────────────────────────────────────────────────────────────────────
     BLOB SCALE  —  SVG 'transform' attribute animation via rAF
     Why not CSS transform/transition?
       CSS transitions on SVG <g> promote compositor layers, which
       isolates the compositing context and breaks mix-blend-mode between
       sibling blob paths. Writing the SVG attribute directly avoids that.
  ──────────────────────────────────────────────────────────────────── */
  var BLOBS = {
    a: { g: svg.querySelector('.blob-a'), cx: 280, cy: 232 },
    b: { g: svg.querySelector('.blob-b'), cx: 572, cy: 232 },
    c: { g: svg.querySelector('.blob-c'), cx: 426, cy: 405 }
  };
  var scales  = { a: 1.0, b: 1.0, c: 1.0 };
  var targets = { a: 1.0, b: 1.0, c: 1.0 };
  var rafs    = {};

  /* Ease out back — slight overshoot spring feel */
  function easeOutBack(t) {
    var c1 = 1.5, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  }
  /* Ease in-out quad — smooth release */
  function easeInOutQuad(t) {
    return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
  }

  function applyScale(zone) {
    var b = BLOBS[zone];
    if (!b.g) return;
    var s = scales[zone];
    /* translate to center → scale → translate back */
    b.g.setAttribute('transform',
      'translate(' + b.cx + ',' + b.cy + ')' +
      ' scale(' + s.toFixed(5) + ')' +
      ' translate(' + (-b.cx) + ',' + (-b.cy) + ')');
  }

  function animateTo(zone, target) {
    if (rafs[zone]) cancelAnimationFrame(rafs[zone]);
    var start0 = scales[zone];
    var t0     = performance.now();
    /* spring in = 480 ms, release = 320 ms */
    var dur    = target > 1 ? 480 : 320;
    var ease   = target > 1 ? easeOutBack : easeInOutQuad;

    function step(now) {
      var t = Math.min((now - t0) / dur, 1);
      scales[zone] = start0 + (target - start0) * ease(t);
      applyScale(zone);
      if (t < 1) rafs[zone] = requestAnimationFrame(step);
    }
    rafs[zone] = requestAnimationFrame(step);
  }

  /* ── Zone hover: hit rects trigger scale + CSS data-hover ── */
  svg.querySelectorAll('.rv-hit').forEach(function (el) {
    el.addEventListener('mouseenter', function () {
      var z = el.getAttribute('data-zone');
      svg.setAttribute('data-hover', z);
      animateTo(z, 1.07);
    });
    el.addEventListener('mouseleave', function () {
      var z = el.getAttribute('data-zone');
      svg.removeAttribute('data-hover');
      animateTo(z, 1.0);
    });
  });

  /* ── Paper tag tooltip ── */
  if (!tip || !wrap) return;
  svg.querySelectorAll('.paper-tag').forEach(function (el) {
    el.addEventListener('mouseenter', function () {
      var t = el.getAttribute('data-title');
      var v = el.getAttribute('data-venue');
      if (!t) return;
      tip.innerHTML = '<strong>' + t + '</strong>' +
        '<br><span style="color:#888;font-size:11.5px">' + v + '</span>';
      tip.style.display = 'block';
    });
    el.addEventListener('mousemove', function (e) {
      var r = wrap.getBoundingClientRect();
      var x = e.clientX - r.left + 14;
      var y = e.clientY - r.top  + 14;
      if (x + 315 > r.width)  x = e.clientX - r.left - 322;
      if (y + 90  > r.height) y = e.clientY - r.top  - 98;
      tip.style.left = x + 'px';
      tip.style.top  = y + 'px';
    });
    el.addEventListener('mouseleave', function () {
      tip.style.display = 'none';
    });
  });
}());
</script>
